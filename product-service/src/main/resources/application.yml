server:
  port: 8082 # Port for Product Service, as requested

spring:
  application:
    name: product-service # This name is used by Eureka for service discovery
  datasource:
    # URL to the PostgreSQL database
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/ecommerce_product_db
    # Database credentials provided by you
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 'update' tells Hibernate to automatically create/update database tables based on our Entity classes
      ddl-auto: update
    # Show SQL queries in the console for debugging
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/} # URL of the Eureka server

# SpringDoc OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
